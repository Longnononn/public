name: Clone Source from Private Repo

# Clones source code from private repo before training
on:
  workflow_call:
    outputs:
      commit_sha:
        description: 'Commit SHA from private repo'
        value: ${{ jobs.clone.outputs.commit_sha }}
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to clone'
        required: false
        default: 'main'

jobs:
  clone:
    name: Clone Source Code
    runs-on: ubuntu-latest
    outputs:
      commit_sha: ${{ steps.clone.outputs.commit_sha }}
    
    steps:
    - name: Checkout Public Repo
      uses: actions/checkout@v4

    - name: Set Branch
      id: vars
      run: |
        if [ "${{ github.event_name }}" == "workflow_dispatch" ] && [ -n "${{ github.event.inputs.branch }}" ]; then
          echo "branch=${{ github.event.inputs.branch }}" >> $GITHUB_OUTPUT
        else
          echo "branch=main" >> $GITHUB_OUTPUT
        fi
        echo "Event: ${{ github.event_name }}"

    - name: Clone Private Repo Source
      env:
        NEXUSINFINITECORE: ${{ secrets.NEXUSINFINITECORE }}
      run: |
        if [ -z "$NEXUSINFINITECORE" ]; then
          echo "ERROR: Secret NEXUSINFINITECORE is NOT available"
          exit 1
        fi
        echo "Secret is available (length: ${#NEXUSINFINITECORE})"
        
        BRANCH="${{ steps.vars.outputs.branch }}"
        git clone --depth 1 --branch $BRANCH https://${NEXUSINFINITECORE}@github.com/Longnononn/Private.git private_source
        
        cd private_source
        COMMIT_SHA=$(git rev-parse HEAD)
        echo "commit_sha=$COMMIT_SHA" >> $GITHUB_OUTPUT
        echo "Cloned source from Longnononn/Private@$BRANCH"
        echo "Commit: $COMMIT_SHA"

    - name: Copy Source Files
      run: |
        # Copy only source files (not data/weights)
        mkdir -p src tests scripts
        cp -r private_source/src/* src/ || true
        cp -r private_source/tests/* tests/ || true
        cp -r private_source/scripts/* scripts/ || true
        cp private_source/CMakeLists.txt . || true
        cp private_source/Makefile . || true
        cp private_source/*.h . || true
        cp private_source/*.cpp . || true

    - name: Get Commit SHA
      id: clone
      run: |
        cd private_source
        COMMIT_SHA=$(git rev-parse HEAD)
        echo "commit_sha=$COMMIT_SHA" >> $GITHUB_OUTPUT
        echo "Cloned source from Longnononn/Private@${{ github.event.inputs.branch || 'main' }}"
        echo "Commit: $COMMIT_SHA"

    - name: Upload Source Artifact
      uses: actions/upload-artifact@v4
      with:
        name: source-code-${{ github.run_id }}
        path: |
          src/
          tests/
          scripts/
          CMakeLists.txt
          Makefile
          *.h
          *.cpp
        retention-days: 1
