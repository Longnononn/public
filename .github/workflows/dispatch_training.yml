name: Dispatch Training to Private Repo

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Training mode'
        required: true
        default: 'selfplay'
        type: choice
        options:
          - selfplay
          - full-cycle
          - train-only
      games:
        description: 'Self-play games (if applicable)'
        required: false
        default: '10000'
      epochs:
        description: 'Training epochs'
        required: false
        default: '1'

permissions:
  actions: write
  contents: read

jobs:
  dispatch:
    name: Dispatch to Private Core
    runs-on: ubuntu-latest
    
    steps:
    - name: Send Dispatch Event
      uses: peter-evans/repository-dispatch@v3
      with:
        token: ${{ secrets.nexusinfinitecore }}
        repository: Longnononn/Private
        event-type: public-training-request
        client-payload: |
          {
            "mode": "${{ github.event.inputs.mode }}",
            "games": "${{ github.event.inputs.games }}",
            "epochs": "${{ github.event.inputs.epochs }}",
            "requested_by": "${{ github.actor }}",
            "timestamp": "${{ github.event.timestamp }}"
          }
    
    - name: Log Dispatch
      run: |
        echo "Dispatched ${{ github.event.inputs.mode }} to Longnononn/Private"
        echo "Games: ${{ github.event.inputs.games }}, Epochs: ${{ github.event.inputs.epochs }}"
