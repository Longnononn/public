name: Micro-Training - 1 Epoch Checkpoint Resume

# The core of infinite training on GitHub Actions alone.
# Each run: loads checkpoint from previous run -> trains 1 epoch -> saves new checkpoint.
# Chaining: this workflow triggers itself via workflow_run or repository_dispatch.
# 
# WHY THIS WORKS:
# - GitHub Actions limits: 6h/job, CPU-only
# - Solution: many tiny jobs, each doing 1 epoch, resuming from checkpoint artifact
# - Over time: unlimited training despite job limits
#
# TRIGGER METHODS:
# 1. workflow_run: triggered after self-play + merge completes
# 2. repository_dispatch: triggered manually or by scheduler
# 3. workflow_call: called by scheduler
# 4. Self-trigger: on completion, triggers next micro-train job

on:
  workflow_run:
    workflows: ["Dataset Merge"]
    types: [completed]
    branches: [main, master]
  
  repository_dispatch:
    types: [micro-train, dataset-ready]
  
  workflow_call:
    inputs:
      dataset_artifact:
        description: 'Dataset artifact to train on'
        required: true
        type: string
      resume_checkpoint:
        description: 'Checkpoint artifact to resume from'
        required: false
        type: string
        default: ''
      epochs:
        description: 'Epochs to train (micro-training = 1)'
        required: false
        type: string
        default: '1'
      batch_size:
        description: 'Batch size for CPU training'
        required: false
        type: string
        default: '4096'
      hidden_size:
        description: 'Hidden layer size (tiny NNUE)'
        required: false
        type: string
        default: '128'
      max_positions:
        description: 'Max positions (0=all, limit for speed)'
        required: false
        type: string
        default: '500000'
  
  # Self-trigger for continuous training (when dataset doesn't change)
  workflow_dispatch:
    inputs:
      resume_only:
        description: 'Resume from last checkpoint without new data'
        required: false
        default: false
        type: boolean

env:
  EPOCHS: ${{ github.event.inputs.epochs || '1' }}
  BATCH_SIZE: ${{ github.event.inputs.batch_size || '4096' }}
  HIDDEN_SIZE: ${{ github.event.inputs.hidden_size || '128' }}
  MAX_POSITIONS: ${{ github.event.inputs.max_positions || '500000' }}

jobs:
  # ======== Setup Environment ========
  setup:
    name: Setup Training Environment
    runs-on: ubuntu-latest  # CPU-only, but optimized for CPU training
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Python + Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install torch --index-url https://download.pytorch.org/whl/cpu
        pip install tensorboard numpy scipy tqdm
        echo "=== Environment ==="
        python -c "import torch; print(f'PyTorch: {torch.__version__}'); print(f'CPU threads: {torch.get_num_threads()}')"

    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt', 'scripts/train_nnue.py') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Upload Setup Artifact
      uses: actions/upload-artifact@v4
      with:
        name: micro-train-env-${{ github.run_id }}
        path: |
          scripts/train_nnue.py
          scripts/checkpoint_resume.py
          src/nnue.h
          src/nnue.cpp
        retention-days: 1

  # ======== Download Dataset ========
  load-data:
    name: Load Training Data
    needs: setup
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # Strategy 1: Try to get dataset from workflow_run trigger
    - name: Download Dataset from Trigger
      if: github.event.workflow_run != null
      run: |
        echo "Triggered by workflow_run"
        # Dataset artifact name is passed via workflow_run
        echo "dataset_source=workflow_run" >> $GITHUB_ENV

    # Strategy 2: Get dataset from workflow_call input
    - name: Download Dataset from Input
      if: github.event.inputs.dataset_artifact != null && github.event.inputs.dataset_artifact != ''
      uses: actions/download-artifact@v4
      with:
        name: ${{ github.event.inputs.dataset_artifact }}
        path: ./data

    # Strategy 3: Get dataset from repository_dispatch payload
    - name: Download Dataset from Dispatch
      if: github.event.action == 'dataset-ready' && github.event.client_payload.dataset_file != null
      run: |
        echo "Dataset from dispatch: ${{ github.event.client_payload.dataset_file }}"
        # The dataset file path is in the payload
        # For now, we'll use a placeholder or try to find latest dataset artifact

    # Strategy 4: Find latest merged dataset artifact
    - name: Find Latest Dataset Artifact
      if: env.dataset_source == null || env.dataset_source == ''
      run: |
        echo "Looking for latest dataset artifact..."
        # List recent artifacts
        python3 -c "
import json, os, sys
# In real usage, would query GitHub API for artifact list
print('Will search for dataset-merged-* artifacts')
" || true

    - name: Check Available Data
      run: |
        mkdir -p data
        ls -lh data/ 2>/dev/null || true
        find . -name '*.txt' -path '*/data/*' -o -name '*.binpack' -path '*/data/*' 2>/dev/null | head -20

    - name: Upload Data Status
      uses: actions/upload-artifact@v4
      with:
        name: micro-train-data-${{ github.run_id }}
        path: data/
        retention-days: 1

  # ======== Download Previous Checkpoint ========
  load-checkpoint:
    name: Load Previous Checkpoint
    needs: setup
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # Strategy 1: Download from workflow_call input
    - name: Download Checkpoint from Input
      if: github.event.inputs.resume_checkpoint != null && github.event.inputs.resume_checkpoint != ''
      uses: actions/download-artifact@v4
      with:
        name: ${{ github.event.inputs.resume_checkpoint }}
        path: ./checkpoints

    # Strategy 2: Download latest checkpoint artifact
    - name: Download Latest Checkpoint
      id: download_latest
      continue-on-error: true
      run: |
        mkdir -p checkpoints
        
        # Try to find checkpoint artifacts from previous runs
        # In GitHub Actions, we can use API to list artifacts
        python3 -c "
import os, json, urllib.request, sys

try:
    repo = os.environ['GITHUB_REPOSITORY']
    token = os.environ.get('GITHUB_TOKEN', '')
    
    url = f'https://api.github.com/repos/{repo}/actions/artifacts?name=checkpoint&per_page=5'
    
    req = urllib.request.Request(url)
    if token:
        req.add_header('Authorization', f'token {token}')
    req.add_header('Accept', 'application/vnd.github.v3+json')
    
    with urllib.request.urlopen(req, timeout=30) as resp:
        data = json.loads(resp.read().decode())
        
        artifacts = data.get('artifacts', [])
        if artifacts:
            # Get most recent checkpoint artifact
            latest = artifacts[0]
            print(f'Latest checkpoint artifact: {latest[\"name\"]} (id={latest[\"id\"]})')
            # Download URL requires token
            print(f'Download URL: {latest[\"archive_download_url\"]}')
        else:
            print('No checkpoint artifacts found')
except Exception as e:
    print(f'Could not list artifacts: {e}')
    print('Will start from scratch')
" || true

    - name: Check for Existing Checkpoints in Repo
      run: |
        # Check if there are checkpoint files already in the repo
        if [ -f "checkpoints/checkpoint_history.json" ]; then
          echo "Found checkpoint history in repo"
          cat checkpoints/checkpoint_history.json | head -20
        fi
        
        # List any checkpoint files
        ls -lh checkpoints/ 2>/dev/null || echo "No checkpoints directory"

    - name: Upload Checkpoint Status
      uses: actions/upload-artifact@v4
      with:
        name: micro-train-checkpoint-in-${{ github.run_id }}
        path: checkpoints/
        retention-days: 1

  # ======== Micro-Training: 1 Epoch ========
  train:
    name: Micro-Train 1 Epoch
    needs: [setup, load-data, load-checkpoint]
    runs-on: ubuntu-latest
    outputs:
      epoch: ${{ steps.results.outputs.epoch }}
      loss: ${{ steps.results.outputs.loss }}
      val_loss: ${{ steps.results.outputs.val_loss }}
      checkpoint_name: ${{ steps.results.outputs.checkpoint_name }}
      nnue_ready: ${{ steps.results.outputs.nnue_ready }}
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Restore Python Dependencies
      run: |
        pip install torch --index-url https://download.pytorch.org/whl/cpu 2>/dev/null || pip install torch
        pip install tensorboard numpy scipy tqdm

    - name: Download Dataset
      uses: actions/download-artifact@v4
      with:
        name: micro-train-data-${{ github.run_id }}
        path: ./data
      continue-on-error: true

    - name: Download Checkpoint
      uses: actions/download-artifact@v4
      with:
        name: micro-train-checkpoint-in-${{ github.run_id }}
        path: ./checkpoints
      continue-on-error: true

    - name: Prepare Training Data
      run: |
        mkdir -p data checkpoints
        
        # Find dataset file
        DATASET=$(find data -name '*.txt' -not -name 'shard*' -not -name 'perft*' | head -1)
        
        if [ -z "$DATASET" ]; then
          echo "No dataset found, creating minimal test dataset"
          # Create a tiny test dataset for demonstration
          mkdir -p data
          echo '# Test dataset' > data/test_train.txt
          echo 'rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1 | 0 | 0 | opening | test | 0' >> data/test_train.txt
          DATASET=data/test_train.txt
        fi
        
        echo "Dataset: $DATASET"
        wc -l "$DATASET" 2>/dev/null || true
        echo "dataset_path=$DATASET" >> $GITHUB_ENV
        
        # Find checkpoint to resume from
        CHECKPOINT=$(find checkpoints -name '*.ckpt' -o -name '*.pt' | head -1)
        if [ -n "$CHECKPOINT" ]; then
          echo "Found checkpoint: $CHECKPOINT"
          echo "resume_checkpoint=$CHECKPOINT" >> $GITHUB_ENV
        else
          echo "No checkpoint found, training from scratch"
          echo "resume_checkpoint=" >> $GITHUB_ENV
        fi

    - name: Run Micro-Training (1 Epoch)
      id: training
      timeout-minutes: 300  # 5 hours max (GitHub limit is 6h)
      run: |
        mkdir -p checkpoints models
        
        # Determine if we resume
        RESUME_ARG=""
        if [ -n "${{ env.resume_checkpoint }}" ] && [ -f "${{ env.resume_checkpoint }}" ]; then
          RESUME_ARG="--resume ${{ env.resume_checkpoint }}"
          echo "Resuming from: ${{ env.resume_checkpoint }}"
        else
          echo "Training from scratch (no checkpoint)"
        fi
        
        # Run training with micro settings
        python3 scripts/train_nnue.py \
          --data "${{ env.dataset_path }}" \
          --output models/candidate.nnue \
          --epochs ${{ env.EPOCHS }} \
          --batch-size ${{ env.BATCH_SIZE }} \
          --hidden-size ${{ env.HIDDEN_SIZE }} \
          --max-positions ${{ env.MAX_POSITIONS }} \
          --lr 0.001 \
          --weight-decay 1e-5 \
          --val-split 0.05 \
          --checkpoints-dir checkpoints \
          $RESUME_ARG \
          2>&1 | tee training.log

    - name: Extract Results
      id: results
      run: |
        # Parse training log for epoch and loss
        EPOCH=$(grep -oP 'Epoch \K\d+' training.log | tail -1 || echo "1")
        LOSS=$(grep -oP 'Train Loss: \K[0-9.]+' training.log | tail -1 || echo "N/A")
        VAL_LOSS=$(grep -oP 'Val Loss: \K[0-9.]+' training.log | tail -1 || echo "N/A")
        
        echo "epoch=$EPOCH" >> $GITHUB_OUTPUT
        echo "loss=$LOSS" >> $GITHUB_OUTPUT
        echo "val_loss=$VAL_LOSS" >> $GITHUB_OUTPUT
        
        # Find generated checkpoint
        CHECKPOINT=$(find checkpoints -name '*.ckpt' -o -name '*.pt' | head -1)
        if [ -n "$CHECKPOINT" ]; then
          echo "checkpoint_file=$CHECKPOINT" >> $GITHUB_OUTPUT
          echo "checkpoint_name=$(basename $CHECKPOINT)" >> $GITHUB_OUTPUT
        fi
        
        # Check if NNUE was exported
        if [ -f "models/candidate.nnue" ]; then
          SIZE=$(stat -c%s models/candidate.nnue 2>/dev/null || stat -f%z models/candidate.nnue)
          echo "nnue_size=$SIZE" >> $GITHUB_OUTPUT
          echo "nnue_ready=true" >> $GITHUB_OUTPUT
        else
          echo "nnue_ready=false" >> $GITHUB_OUTPUT
        fi

    - name: Upload Checkpoint Out
      uses: actions/upload-artifact@v4
      with:
        name: checkpoint-epoch${{ steps.results.outputs.epoch }}-${{ github.run_id }}
        path: |
          checkpoints/
          models/candidate.nnue
          training.log
        retention-days: 14
        if-no-files-found: warn

    - name: Upload Model
      uses: actions/upload-artifact@v4
      with:
        name: nnue-candidate-${{ github.run_id }}
        path: models/candidate.nnue
        retention-days: 7
        if-no-files-found: warn

  # ======== Trigger Next Micro-Train (Self-Chaining) ========
  chain-next:
    name: Trigger Next Training Cycle
    needs: train
    if: always() && (needs.train.result == 'success' || needs.train.result == 'failure')
    runs-on: ubuntu-latest
    
    steps:
    - name: Determine Next Action
      id: decide
      run: |
        # Check if training completed successfully
        if [ "${{ needs.train.result }}" == "success" ]; then
          echo "Training succeeded, triggering SPRT validation"
          echo "next_action=sprt" >> $GITHUB_OUTPUT
        else
          echo "Training failed, will retry in next scheduler cycle"
          echo "next_action=wait" >> $GITHUB_OUTPUT
        fi

    - name: Trigger SPRT Validation
      if: steps.decide.outputs.next_action == 'sprt'
      uses: peter-evans/repository-dispatch@v3
      with:
        event-type: model-trained
        client-payload: |
          {
            "run_id": "${{ github.run_id }}",
            "candidate_artifact": "nnue-candidate-${{ github.run_id }}",
            "checkpoint_artifact": "checkpoint-epoch${{ needs.train.outputs.epoch }}-${{ github.run_id }}",
            "epoch": "${{ needs.train.outputs.epoch }}",
            "loss": "${{ needs.train.outputs.loss }}",
            "val_loss": "${{ needs.train.outputs.val_loss }}",
            "trigger_next_train": true
          }

    - name: Summary
      run: |
        echo "=== Micro-Training Cycle Complete ==="
        echo "Run ID: ${{ github.run_id }}"
        echo "Epoch: ${{ needs.train.outputs.epoch }}"
        echo "Train Loss: ${{ needs.train.outputs.loss }}"
        echo "Val Loss: ${{ needs.train.outputs.val_loss }}"
        echo "NNUE Ready: ${{ needs.train.outputs.nnue_ready }}"
        echo "Next Action: ${{ steps.decide.outputs.next_action }}"
        echo ""
        echo "Checkpoints saved for next cycle"
        echo "Trigger next micro-train after SPRT validation..."

  # Open source - weights stay in this repo
