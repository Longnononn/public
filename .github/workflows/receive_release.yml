name: Receive Release from Private Core

# Triggered by private repo when new build is ready
on:
  repository_dispatch:
    types: [release-ready, nnue-update]

permissions:
  contents: write
  actions: write

jobs:
  receive-and-publish:
    name: Receive and Publish Release
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Download Build Artifacts from Private
      run: |
        # Download artifacts using GitHub API
        PRIVATE_REPO="Longnononn/Private"
        TOKEN="${{ secrets.nexusinfinitecore }}"
        RUN_ID="${{ github.event.client_payload.run_id }}"
        
        # Create releases directory
        mkdir -p releases/latest
        
        # Download artifacts (simplified - actual impl would use API)
        echo "Downloading from $PRIVATE_REPO run $RUN_ID"
        
    - name: Update ELO Dashboard
      run: |
        cat > ELO_DASHBOARD.md << 'EOF'
        # Nexus Infinite ELO History
        
        Last updated: $(date -u +"%Y-%m-%d %H:%M UTC")
        
        | Version | ELO | Games | Date |
        |---------|-----|-------|------|
        EOF
        
        # Append new entry if provided
        if [ -n "${{ github.event.client_payload.elo }}" ]; then
          echo "| ${{ github.event.client_payload.version }} | ${{ github.event.client_payload.elo }} | ${{ github.event.client_payload.games }} | $(date +%Y-%m-%d) |" >> ELO_DASHBOARD.md
        fi
        
    - name: Commit and Tag
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add ELO_DASHBOARD.md releases/
        git commit -m "Release ${{ github.event.client_payload.version }} - ELO: ${{ github.event.client_payload.elo }}"
        
        # Create tag
        if [ -n "${{ github.event.client_payload.version }}" ]; then
          git tag "${{ github.event.client_payload.version }}"
          git push origin main --tags
        fi
        
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      if: github.event.client_payload.create_release == 'true'
      with:
        tag_name: ${{ github.event.client_payload.version }}
        name: "Nexus Infinite ${{ github.event.client_payload.version }}"
        body: |
          Automated release from training pipeline.
          
          ELO: ${{ github.event.client_payload.elo }}
          Games: ${{ github.event.client_payload.games }}
        files: |
          releases/latest/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
