name: Stockfish Gauntlet (Bullet)

on:
  workflow_dispatch:
    inputs:
      tc:
        description: 'Time control (cutechess format), e.g. 2+0.02 (Bullet)'
        required: true
        default: '2+0.02'
      games:
        description: 'Number of games (safe limit for 6h timeout)'
        required: true
        default: '150'
      stockfish_cmd:
        description: 'Stockfish command (default: use apt stockfish)'
        required: false
        default: ''
      commit_results:
        description: 'Commit elo result json into repo'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  gauntlet:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ python3 cutechess-cli

      - name: Download Latest Stockfish
        run: |
          # Get latest Stockfish release info
          SF_URL=$(curl -s https://api.github.com/repos/official-stockfish/Stockfish/releases/latest | \
            grep -o '"browser_download_url": "[^"]*linux[^"]*.zip"' | head -1 | cut -d'"' -f4)
          
          if [ -z "$SF_URL" ]; then
            # Fallback to Stockfish 18
            SF_URL="https://github.com/official-stockfish/Stockfish/releases/download/sf_18/stockfish-ubuntu-x86-64-vnni256.tar"
          fi
          
          echo "Downloading Stockfish from: $SF_URL"
          
          # Download and extract
          if [[ "$SF_URL" == *.zip ]]; then
            curl -L -o stockfish.zip "$SF_URL"
            unzip -o stockfish.zip -d stockfish_tmp/
            find stockfish_tmp -name "stockfish*" -type f -executable -exec cp {} ./stockfish \;
            rm -rf stockfish_tmp stockfish.zip
          else
            curl -L -o stockfish.tar "$SF_URL"
            tar -xf stockfish.tar
            find . -name "stockfish*" -type f -executable | head -1 | xargs -I {} cp {} ./stockfish
            rm -f stockfish.tar
          fi
          
          chmod +x ./stockfish
          ./stockfish --version
          echo "cmd=./stockfish" >> $GITHUB_OUTPUT
        id: download_sf

      - name: Build Nexus
        run: |
          mkdir -p build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc)
          cd ..
          cp build/nexus ./nexus
          chmod +x ./nexus

      - name: Determine Stockfish command
        id: sf
        run: |
          if [ -n "${{ github.event.inputs.stockfish_cmd }}" ]; then
            echo "cmd=${{ github.event.inputs.stockfish_cmd }}" >> $GITHUB_OUTPUT
          else
            echo "cmd=./stockfish" >> $GITHUB_OUTPUT
          fi

      - name: Run match
        run: |
          TC="${{ github.event.inputs.tc }}"
          GAMES="${{ github.event.inputs.games }}"

          # Calculate safe game limit based on TC (rough estimate)
          # Bullet (2+0.02): ~2-3 min/game, 150 games = ~5 hours max
          echo "Running gauntlet: $GAMES games at $TC"
          echo "Estimated time: $(($GAMES * 3 / 60)) hours max (conservative)"
          
          cutechess-cli \
            -engine name=Nexus cmd=./nexus proto=uci \
            -engine name=Stockfish cmd="${{ steps.sf.outputs.cmd }}" proto=uci \
            -each tc=$TC \
            -games $GAMES \
            -rounds $((GAMES / 2)) \
            -repeat \
            -concurrency 1 \
            -pgnout match.pgn \
            -recover \
            -site "GitHub Actions" \
            | tee match.log

      - name: Compute Elo estimate
        run: |
          python3 - << 'PY'
          import json, re, time, math

          log = open('match.log', 'r', encoding='utf-8', errors='ignore').read().splitlines()

          # cutechess summary usually contains:
          # "Score of Nexus vs Stockfish: W - L - D  [P]"
          pat = re.compile(r"^Score of (.+?) vs (.+?):\s*(\d+)\s*-\s*(\d+)\s*-\s*(\d+)")

          w = l = d = None
          for line in reversed(log):
              m = pat.search(line.strip())
              if m:
                  w, l, d = map(int, m.group(3,4,5))
                  break

          out = {
              'timestamp': int(time.time()),
              'tc': '${{ github.event.inputs.tc }}',
              'games_requested': int('${{ github.event.inputs.games }}'),
              'wins': w,
              'losses': l,
              'draws': d,
              'score': None,
              'elo_estimate': None,
              'elo_ci95_low': None,
              'elo_ci95_high': None,
              'games_played': None,
          }

          if w is not None:
              n = w + l + d
              out['games_played'] = n
              p = (w + 0.5*d) / n if n else 0.5
              out['score'] = p

              # Elo from score using logistic model: p = 1/(1+10^(-Elo/400))
              eps = 1e-9
              p_clip = min(max(p, eps), 1 - eps)
              elo = 400.0 * math.log10(p_clip / (1.0 - p_clip))
              out['elo_estimate'] = elo

              # Approximate 95% CI by propagating binomial SE of score.
              # Treat each game as score in {0, 0.5, 1} and approximate variance with p(1-p)/n.
              # This is not as rigorous as BayesElo, but gives a useful stability signal.
              if n > 0:
                  se_p = math.sqrt(max(p * (1.0 - p), 0.0) / n)
                  z = 1.96
                  p_low = min(max(p - z * se_p, eps), 1 - eps)
                  p_high = min(max(p + z * se_p, eps), 1 - eps)
                  out['elo_ci95_low'] = 400.0 * math.log10(p_low / (1.0 - p_low))
                  out['elo_ci95_high'] = 400.0 * math.log10(p_high / (1.0 - p_high))

          with open('elo_result.json', 'w', encoding='utf-8') as f:
              json.dump(out, f, indent=2)

          print(json.dumps(out, indent=2))
          PY

      - name: Commit result (optional)
        if: ${{ github.event.inputs.commit_results }}
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          mkdir -p gauntlet_results
          cp elo_result.json gauntlet_results/elo_result_${{ github.run_id }}.json
          git add gauntlet_results/elo_result_${{ github.run_id }}.json
          git commit -m "Gauntlet vs Stockfish: run ${{ github.run_id }}" || exit 0
          git push

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: stockfish-gauntlet-${{ github.run_id }}
          path: |
            match.log
            match.pgn
            elo_result.json
